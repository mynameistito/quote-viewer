name: Bug Report
description: Report a problem with quote-viewer
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include cookies, tokens, private keys, or private account data.
        AI-assisted reports are fine, but please keep them concise and review the content before submitting.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction you can.
      placeholder: |
        1. Go to ...
        2. Open ...
        3. Click ...
        4. See ...
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Edge
        - Brave
        - Firefox
        - Other Chromium browser
        - Other
    validations:
      required: true
  - type: input
    id: browser-version
    attributes:
      label: Browser version
      placeholder: "Example: Chrome 126.0.6478.127"
  - type: input
    id: extension-version
    attributes:
      label: quote-viewer version
      placeholder: "Example: 0.2.5"
  - type: dropdown
    id: page-type
    attributes:
      label: Where did it happen?
      options:
        - Timeline
        - Profile
        - Tweet detail page
        - Search results
        - Notifications
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Console output or screenshots
      description: Add relevant console output, screenshots, or recordings if they help explain the issue.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: I did not include secrets, cookies, tokens, private keys, or private account data.
          required: true
