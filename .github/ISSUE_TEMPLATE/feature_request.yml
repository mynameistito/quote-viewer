name: Feature Request
description: Suggest an improvement for quote-viewer
title: "Feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        AI-assisted requests are fine, but please keep them concise and review the content before submitting.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds have you considered?
  - type: dropdown
    id: browsers
    attributes:
      label: Browser impact
      options:
        - Chrome/Chromium only
        - Firefox only
        - Both Chrome/Chromium and Firefox
        - Not browser-specific
        - Unsure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, recordings, examples, or links if useful.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This request is about quote-viewer, not Twitter/X itself.
          required: true
