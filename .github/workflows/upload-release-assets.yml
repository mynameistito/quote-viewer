name: Upload Release Assets

# Manually-triggered backfill: build the extension at a given tag and upload
# the chrome + firefox zips to the existing GitHub Release for that tag.
# Useful when a previous release run created a release without assets (e.g.
# v0.1.1, where the publish-release script's glob silently matched nothing).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to attach zips to (e.g. v0.1.1)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  upload:
    name: Upload zips to ${{ inputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension zips
        env:
          WXT_CHROME_KEY: ${{ secrets.WXT_CHROME_KEY }}
        run: bun run zip:all

      - name: Upload zips to existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Inlined (rather than calling `bun run publish-release`) because
        # this workflow checks out the historical tag, which may contain the
        # original buggy version of the script.
        run: gh release upload "${{ inputs.tag }}" .output/*.zip --clobber
