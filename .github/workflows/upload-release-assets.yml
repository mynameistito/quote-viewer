name: Upload Release Assets

# Manually-triggered backfill: build the extension at a given tag and (re)create
# the GitHub Release for that tag with the chrome + firefox zips attached.
# Useful when a release ended up without assets (e.g. v0.1.1 / v0.1.2, where
# changesets/action created an empty immutable release before our publish
# script ran).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)create with zips (e.g. v0.1.2)"
        required: true
        type: string
      ref:
        description: "Git ref or SHA to build from. Defaults to the tag itself. Required when the tag is not yet on the remote (e.g. for v0.1.3, pass the merge commit SHA)."
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  upload:
    name: Upload zips to ${{ inputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ref
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          # Defaults to the tag; pass `ref` when the tag isn't on the remote.
          ref: ${{ inputs.ref || inputs.tag }}
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build extension zips
        env:
          WXT_CHROME_KEY: ${{ secrets.WXT_CHROME_KEY }}
        run: bun run zip:all

      - name: Recreate release with zips attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Inlined (rather than `bun run publish-release`) because this
        # workflow checks out the historical tag, which may contain an older
        # buggy version of the script. The repo has Immutable Releases on,
        # so the only way to add assets is delete + recreate. Deleting the
        # release keeps the git tag intact.
        run: |
          tag='${{ inputs.tag }}'
          sha="$(git rev-parse HEAD)"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Deleting existing release $tag (tag is preserved)…"
            gh release delete "$tag" --yes
          fi
          # --target ensures the tag is created server-side at the right
          # commit when it doesn't already exist on the remote.
          gh release create "$tag" .output/*.zip \
            --target "$sha" \
            --title "$tag" \
            --generate-notes
