name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "22 16 * * 0"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task:
          - typecheck
          - test
          - check
          - build
          - build:firefox
          - knip
    name: ${{ matrix.task }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup project
        uses: ./.github/actions/setup-bun-project

      - name: Run task
        run: bun run ${{ matrix.task }}
