name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release Pull Request or release extension
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b
        with:
          # `bun run version` bumps package.json + writes CHANGELOG.md.
          # `bun run release` (only runs after the Version Packages PR is
          # merged) does the whole release in one shot:
          #   zip:all  → produces .output/quote-viewer-<v>-{chrome,firefox}.zip
          #   changeset tag → creates the local v<version> tag
          #   publish-release → creates the GitHub Release at $GITHUB_SHA
          #     with the zips attached (also creates the remote tag via
          #     `gh release create --target`).
          version: bun run version
          publish: bun run release
          # Disabled because publish-release.ts owns release creation; without
          # this the action would race us by creating an empty (immutable)
          # release first.
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `gh` CLI used by publish-release.ts reads GH_TOKEN.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WXT_CHROME_KEY: ${{ secrets.WXT_CHROME_KEY }}
