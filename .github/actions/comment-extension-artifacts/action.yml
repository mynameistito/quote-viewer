name: Comment Extension Artifacts
description: Upload extension packages and add a PR comment with the artifact link.

inputs:
  chrome-artifact-name:
    description: Name for the uploaded Chrome artifact.
    default: chrome-extension
  chrome-artifact-path:
    description: Glob for the Chrome package file to upload.
    default: .output/*-chrome.zip
  firefox-artifact-name:
    description: Name for the uploaded Firefox artifact.
    default: firefox-extension
  firefox-artifact-path:
    description: Glob for the Firefox package file to upload.
    default: .output/*-firefox.zip

runs:
  using: composite
  steps:
    - name: List extension packages
      shell: bash
      run: find "${GITHUB_WORKSPACE}/.output" -type f -name "*.zip" -print

    - name: Upload Chrome package
      id: upload-chrome-package
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.chrome-artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.chrome-artifact-path }}
        if-no-files-found: error
        include-hidden-files: true

    - name: Upload Firefox package
      id: upload-firefox-package
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.firefox-artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.firefox-artifact-path }}
        if-no-files-found: error
        include-hidden-files: true

    - name: Comment artifact link
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        CHROME_ARTIFACT_URL: ${{ steps.upload-chrome-package.outputs.artifact-url }}
        FIREFOX_ARTIFACT_URL: ${{ steps.upload-firefox-package.outputs.artifact-url }}
      with:
        script: |
          const body = `Extension packages are ready for this PR:

          [Download Chrome zip](${process.env.CHROME_ARTIFACT_URL})
          [Download Firefox zip](${process.env.FIREFOX_ARTIFACT_URL})`;

          const { owner, repo } = context.repo;
          await github.rest.issues.createComment({
            owner,
            repo,
            issue_number: context.issue.number,
            body,
          });
