name: Comment Extension Artifacts
description: Upload built extensions and add a PR comment with artifact links.

inputs:
  chrome-artifact-name:
    description: Name for the uploaded Chrome artifact.
    default: chrome-extension
  chrome-artifact-path:
    description: Path for the built Chrome extension to upload.
    default: .output/chrome-mv3
  firefox-artifact-name:
    description: Name for the uploaded Firefox artifact.
    default: firefox-extension
  firefox-artifact-path:
    description: Path for the built Firefox extension to upload.
    default: .output/firefox-mv2

runs:
  using: composite
  steps:
    - name: List built extensions
      shell: bash
      run: find "${GITHUB_WORKSPACE}/.output" -maxdepth 2 -type f -print

    - name: Upload Chrome extension
      id: upload-chrome-extension
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.chrome-artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.chrome-artifact-path }}
        if-no-files-found: error
        include-hidden-files: true

    - name: Upload Firefox extension
      id: upload-firefox-extension
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.firefox-artifact-name }}
        path: ${{ github.workspace }}/${{ inputs.firefox-artifact-path }}
        if-no-files-found: error
        include-hidden-files: true

    - name: Comment artifact link
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        CHROME_ARTIFACT_URL: ${{ steps.upload-chrome-extension.outputs.artifact-url }}
        FIREFOX_ARTIFACT_URL: ${{ steps.upload-firefox-extension.outputs.artifact-url }}
      with:
        script: |
          const shortSha = context.sha.slice(0, 7);
          const body = `Extension artifacts are ready for ${shortSha}:

          [Download Chrome extension](${process.env.CHROME_ARTIFACT_URL})
          [Download Firefox extension](${process.env.FIREFOX_ARTIFACT_URL})`;

          const { owner, repo } = context.repo;
          await github.rest.issues.createComment({
            owner,
            repo,
            issue_number: context.issue.number,
            body,
          });
